
# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'wolt_assignment_dbt'
version: '1.0.0'

# This setting configures which "profile" dbt uses for this project.
profile: 'wolt_assignment_dbt'

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

vars:
  enable_dev_sampling: false
  dev_sample_start_date: "2023-11-01"
  dev_sample_end_date: "2024-02-01"
  incremental_lookback_days: 7
  enable_incremental_lookback_window: false
  enable_watermark_checks: true
  watermark_table_name: "_elt_watermarks"
  run_metadata_table_name: "_run_metadata"
  system_schema_suffix: "sys"
  publish_tag: "scheduled"
  pair_affinity_min_orders_together: 5
  cross_sell_min_pair_orders: 50
  cross_sell_top_products_limit: 30
  cross_sell_trend_top_pairs: 5
  cross_sell_strong_lift_threshold: 1.3
  cross_sell_high_support_threshold: 0.02
  cross_sell_neutral_lift_lower: 0.9
  cross_sell_neutral_lift_upper: 1.1
  dim_date_start_date: "2019-01-01"
  dim_date_end_date: "2026-12-31"


# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models

# In this example config, we tell dbt to build all models in the example/
# directory as views. These settings can be overridden in the individual model
# files using the `{{ config(...) }}` macro.
models:
  wolt_assignment_dbt:
    staging:
      +materialized: view
      +schema: stg
    intermediate:
      +materialized: view
      +schema: int
    marts:
      core:
        +materialized: table
        +schema: core
      reporting:
        +materialized: table
        +schema: rpt
      audit:
        +materialized: table
        +schema: audit
