version: 2

models:
  - name: stg_wolt_item_logs
    description: >
      Staging model for raw item log events. Applies source-conformed transformations only:
      renaming, type casting, and JSON field extraction. No business-rule filtering, deduplication,
      or trust scoring is applied at this layer.
    columns:
      - name: log_item_id
        description: Raw event identifier from source item logs.
        tests:
          - not_null
      - name: item_key
        description: Business key of the catalog item referenced by the log event; used to build item SCD2 history for Task 1 item/price-over-time analysis.
        tests:
          - not_null
      - name: time_log_created_utc
        description: Parsed UTC timestamp when the item log event was created.
        tests:
          - not_null
      - name: product_base_price_gross_eur
        description: Base gross price extracted from payload price attributes; input for item-level pricing and promo-discount calculations.

  - name: stg_wolt_promos
    description: >
      Staging model for promo definitions with typed date and numeric fields only.
      Business validation of promo windows is handled in tests/intermediate layers.
    columns:
      - name: item_key
        description: Item business key the promo applies to; used to join promo rules to order-item rows for Task 1/Task 2 promo questions.
        tests:
          - not_null
      - name: promo_start_date
        description: Promo validity start date (inclusive from local midnight); used in Berlin-local date window join.
        tests:
          - not_null
      - name: promo_end_date
        description: Promo validity end date (exclusive from local midnight); used to close promo applicability window.
        tests:
          - not_null
      - name: discount_pct
        description: Discount percentage typed from raw source; used to compute discount amount and final paid item value.
        tests:
          - not_null

  - name: stg_wolt_purchase_logs
    description: >
      Staging model for order/purchase events with timestamp/date typing and JSON parsing.
      No business aggregations or derived quality filtering is applied in staging.
    columns:
      - name: purchase_key
        description: Order identifier from source purchase logs.
        tests:
          - not_null
          - unique
      - name: customer_key
        description: Customer identifier from source purchase logs; drives first/repeat behavior metrics and customer lifecycle derivations.
        tests:
          - not_null
      - name: time_order_received_utc
        description: Parsed UTC timestamp for order receipt; canonical event-time used for order chronology and item-SCD2 point-in-time price joins.
        tests:
          - not_null

  - name: stg_wolt_order_items
    description: >
      Staging expansion of purchase basket JSON into one row per purchase x item entry.
      Duplicate item keys within the same purchase are defensively aggregated by summing `item_count`.
      This model keeps source-conformed parsing only; enrichment is performed in intermediate models.
    columns:
      - name: purchase_key
        description: Parent order identifier; used to combine basket lines with order-level metrics (fees, distance, customer lifecycle).
        tests:
          - not_null
      - name: item_key
        description: Item identifier extracted from basket payload.
        tests:
          - not_null
      - name: item_count
        description: Ordered quantity extracted from basket payload; used for unit-based metrics (items sold, promo item count, line values).
        tests:
          - not_null
