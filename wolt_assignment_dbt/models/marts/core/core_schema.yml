version: 2

models:
  - name: dim_date
    description: Date dimension used by core facts and reporting aggregates, generated from fixed start/end bounds for reproducibility.
    time_spine:
      standard_granularity_column: date_day
    columns:
      - name: date_day
        granularity: day
        tests:
          - not_null
          - unique

  - name: dim_item_history
    description: SCD2 item dimension exposing both surrogate and business keys with log-level lineage (`log_item_id`) for traceability.
    columns:
      - name: item_scd_sk
        tests:
          - not_null
          - unique
      - name: item_key_sk
        tests:
          - not_null
      - name: item_key
        tests:
          - not_null

  - name: dim_item_current
    description: Current-state item dimension view over item history, exposing both surrogate and business keys.
    columns:
      - name: item_key
        tests:
          - not_null
      - name: item_key_sk
        tests:
          - not_null
          - unique
      - name: item_scd_sk
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_item_history')
                field: item_scd_sk

  - name: dim_promo
    description: Promo dimension exposing both item surrogate key and item business key.
    columns:
      - name: promo_key
        tests:
          - not_null
          - unique
      - name: item_key_sk
        tests:
          - not_null
      - name: item_key
        tests:
          - not_null

  - name: dim_customer
    description: Customer dimension with lifecycle metrics exposing both customer surrogate and business keys.
    columns:
      - name: customer_sk
        tests:
          - not_null
          - unique
      - name: customer_key
        tests:
          - not_null

  - name: fct_order
    description: Order-level fact table exposing both warehouse surrogate keys and source business keys.
    columns:
      - name: order_sk
        tests:
          - not_null
          - unique
      - name: customer_sk
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_sk
      - name: purchase_key
        tests:
          - not_null
      - name: customer_key
        tests:
          - not_null
      - name: order_date
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_day
      - name: order_ts_berlin
        tests:
          - not_null
      - name: order_hour_berlin
        tests:
          - not_null

  - name: fct_order_item
    description: Order-item-level fact table exposing both warehouse surrogate keys and source business keys.
    columns:
      - name: order_item_sk
        tests:
          - not_null
          - unique
      - name: order_sk
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fct_order')
                field: order_sk
      - name: purchase_key
        tests:
          - not_null
      - name: customer_key
        tests:
          - not_null
      - name: item_key
        tests:
          - not_null
      - name: item_key_sk
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_item_current')
                field: item_key_sk
      - name: item_scd_sk
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_item_history')
                field: item_scd_sk
