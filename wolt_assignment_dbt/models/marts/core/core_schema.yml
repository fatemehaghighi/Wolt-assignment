version: 2

models:
  - name: dim_date
    time_spine:
      standard_granularity_column: date_day
    columns:
      - name: date_day
        granularity: day
        tests:
          - not_null
          - unique

  - name: dim_item_history
    columns:
      - name: item_scd_key
        tests:
          - not_null
          - unique
      - name: item_key_sk
        tests:
          - not_null

  - name: dim_item_current
    columns:
      - name: item_key_sk
        tests:
          - not_null
          - unique
      - name: item_scd_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_item_history')
                field: item_scd_key

  - name: dim_promo
    columns:
      - name: promo_key
        tests:
          - not_null
          - unique
      - name: item_key_sk
        tests:
          - not_null

  - name: dim_customer
    columns:
      - name: customer_sk
        tests:
          - not_null
          - unique

  - name: fct_order
    columns:
      - name: order_sk
        tests:
          - not_null
          - unique
      - name: customer_sk
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_sk
      - name: order_date
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_day

  - name: fct_order_item
    columns:
      - name: order_item_sk
        tests:
          - not_null
          - unique
      - name: order_sk
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fct_order')
                field: order_sk
      - name: item_key_sk
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_item_current')
                field: item_key_sk
