version: 2

models:
  - name: rpt_category_overall_scorecard
    description: >
      Overall category scorecard across the full currently-loaded fact window.
      Mirrors the Task 2 Q1 category performance query at category grain (no month split)
      for quick ranking and KPI comparison in BI.
    columns:
      - name: category
        tests:
          - not_null
      - name: revenue_eur
        config:
          meta:
            metrics:
              cos_revenue_eur_sum:
                type: sum
                label: Revenue EUR (Overall)
      - name: share_pct
        config:
          meta:
            metrics:
              cos_share_pct_avg:
                type: average
                label: Revenue Share % (Overall)
      - name: units
        config:
          meta:
            metrics:
              cos_units_sum:
                type: sum
                label: Units (Overall)
      - name: orders
        config:
          meta:
            metrics:
              cos_orders_sum:
                type: sum
                label: Orders (Overall)
      - name: customers
        config:
          meta:
            metrics:
              cos_customers_sum:
                type: sum
                label: Customers (Overall)
      - name: order_pen_pct
        config:
          meta:
            metrics:
              cos_order_pen_pct_avg:
                type: average
                label: Order Penetration % (Overall)
      - name: customer_pen_pct
        config:
          meta:
            metrics:
              cos_customer_pen_pct_avg:
                type: average
                label: Customer Penetration % (Overall)
      - name: asp_eur
        config:
          meta:
            metrics:
              cos_asp_eur_avg:
                type: average
                label: ASP EUR (Overall)
      - name: disc_pct
        config:
          meta:
            metrics:
              cos_disc_pct_avg:
                type: average
                label: Discount % (Overall)
      - name: promo_pct
        config:
          meta:
            metrics:
              cos_promo_pct_avg:
                type: average
                label: Promo % (Overall)
      - name: rev_per_order_eur
        config:
          meta:
            metrics:
              cos_rev_per_order_eur_avg:
                type: average
                label: Revenue Per Order EUR (Overall)
      - name: orders_per_customer
        config:
          meta:
            metrics:
              cos_orders_per_customer_avg:
                type: average
                label: Orders Per Customer (Overall)
      - name: repeat_pct
        config:
          meta:
            metrics:
              cos_repeat_pct_avg:
                type: average
                label: Repeat % (Overall)
      - name: top_sku_pct
        config:
          meta:
            metrics:
              cos_top_sku_pct_avg:
                type: average
                label: Top SKU % (Overall)
      - name: top_3_pct
        config:
          meta:
            metrics:
              cos_top_3_pct_avg:
                type: average
                label: Top 3 % (Overall)
      - name: total_revenue_eur
      - name: total_orders
      - name: total_customers
      - name: promo_orders
      - name: repeat_customers
      - name: top_sku_revenue_eur
      - name: top_3_revenue_eur


  - name: rpt_category_monthly
    description: >
      Monthly category performance report built directly at month grain from atomic facts.
      This model prevents common aggregation mistakes (e.g., avg-of-avg, sum of daily distinct customers)
      and should be the default source for month-level category steering.
    columns:
      - name: order_month
        description: First day of calendar month (Berlin-local order date basis).
        tests:
          - not_null
      - name: item_category
        tests:
          - not_null
      - name: revenue_eur
        description: Revenue EUR = SUM(order_item_row_final_amount_gross_eur) by category-month.
        config:
          meta:
            metrics:
              cm_revenue_eur:
                type: sum
                label: Revenue EUR
      - name: base_revenue_eur
        description: Base revenue EUR = SUM(order_item_row_base_amount_gross_eur) by category-month.
        config:
          meta:
            metrics:
              base_cm_revenue_eur:
                type: sum
                label: Base Revenue EUR
      - name: discount_eur
        description: Discount EUR = SUM(order_item_row_discount_amount_gross_eur) by category-month.
        config:
          meta:
            metrics:
              cm_discount_eur:
                type: sum
                label: Discount EUR
      - name: discount_rate
        description: Discount rate = discount_eur / base_revenue_eur.
        config:
          meta:
            metrics:
              cm_avg_discount_rate:
                type: average
                label: Discount Rate
      - name: orders
        description: Distinct orders in month containing the category.
        config:
          meta:
            metrics:
              cm_orders:
                type: sum
                label: Orders
      - name: customers
        description: Distinct customers in month purchasing the category.
        config:
          meta:
            metrics:
              cm_customers:
                type: sum
                label: Customers
      - name: distinct_customers_in_month
        description: Distinct customers in month purchasing the category.
      - name: distinct_customers_whose_first_order_included_category_in_month
        description: Distinct customers whose first-ever store order (in month) included the category.
      - name: distinct_customers_with_repeat_orders_including_category_in_month
        description: Distinct customers with non-first orders (in month) including the category.
      - name: units_sold
        description: Sum of units sold in category/month.
        config:
          meta:
            metrics:
              cm_units_sold:
                type: sum
                label: Units Sold
      - name: revenue_share
        description: Category revenue share in month = revenue_eur / total revenue across categories in same month.
        config:
          meta:
            metrics:
              cm_avg_revenue_share:
                type: average
                label: Revenue Share
      - name: order_penetration
        description: Category order penetration in month = category orders / total orders in same month.
        config:
          meta:
            metrics:
              cm_avg_order_penetration:
                type: average
                label: Order Penetration
      - name: customer_penetration
        description: Category customer penetration in month = category customers / total customers in same month.
        config:
          meta:
            metrics:
              cm_avg_customer_penetration:
                type: average
                label: Customer Penetration
      - name: asp_eur
        description: ASP EUR = revenue_eur / units_sold.
        config:
          meta:
            metrics:
              cm_avg_asp_eur:
                type: average
                label: ASP EUR
      - name: revenue_per_order_eur
        description: Revenue per order EUR = revenue_eur / orders.
        config:
          meta:
            metrics:
              cm_avg_revenue_per_order_eur:
                type: average
                label: Revenue Per Order EUR
      - name: units_per_order
        description: Units per order = units_sold / orders.
        config:
          meta:
            metrics:
              cm_avg_units_per_order:
                type: average
                label: Units Per Order
      - name: orders_per_customer
        description: Orders per customer = orders / customers.
        config:
          meta:
            metrics:
              cm_avg_orders_per_customer:
                type: average
                label: Orders Per Customer
      - name: repeat_customer_rate
        description: Repeat-customer rate = customers with >1 order in category-month / category customers.
        config:
          meta:
            metrics:
              cm_avg_repeat_customer_rate:
                type: average
                label: Repeat Customer Rate
      - name: sku_count
        description: Distinct product count by category-month using product_name = coalesce(preferred, en, de).
        config:
          meta:
            metrics:
              cm_avg_sku_count:
                type: average
                label: SKU Count
      - name: top_sku_share
        description: Revenue share of top-1 SKU in category-month.
        config:
          meta:
            metrics:
              cm_avg_top_sku_share:
                type: average
                label: Top SKU Share
      - name: top_3_share
        description: Revenue share of top-3 SKUs in category-month.
        config:
          meta:
            metrics:
              cm_avg_top_3_share:
                type: average
                label: Top 3 Share
      - name: top_attached_category
        description: Attached category with highest cross-sell attach rate for base category-month.
      - name: cross_sell_attach_rate
        description: Cross-sell attach rate = orders with both base+attached categories / orders with base category.
        config:
          meta:
            metrics:
              cm_avg_cross_sell_attach_rate:
                type: average
                label: Cross-sell Attach Rate
      - name: promo_units_sold
        description: Sum of promo units sold in category/month.
        config:
          meta:
            metrics:
              promo_cm_units_sold:
                type: sum
                label: Promo Units Sold
      - name: order_item_rows_revenue_eur
        description: Sum of final paid line amounts in category/month.
      - name: order_item_rows_discount_eur
        description: Sum of discount amounts in category/month.
      - name: weighted_avg_selling_price_eur
        description: >
          Monthly weighted average selling price:
          sum(order_item_rows_revenue_eur) / sum(units_sold), computed at month grain.
      - name: avg_order_units_for_orders_with_category
        description: Average total order units among orders that included the category in month.
      - name: avg_delivery_distance_meters
        description: Average delivery distance among orders that included the category in month.


  - name: rpt_category_monthly_kpi_long
    description: >
      Long-format monthly category KPI table for dynamic metric selectors in BI.
      One row per (`order_month`, `item_category`, `metric_name`) with numeric `metric_value`.
    columns:
      - name: order_month
        tests:
          - not_null
      - name: item_category
        tests:
          - not_null
      - name: metric_name
        tests:
          - not_null
      - name: metric_value
        tests:
          - not_null
        config:
          meta:
            metrics:
              kpi_metric_value_sum:
                type: sum
                label: Metric Value

  - name: rpt_category_monthly_kpi_long_mom
    description: >
      Long-format monthly category KPI table with month-over-month deltas.
      Same base grain as `rpt_category_monthly_kpi_long` (one row per
      `order_month`, `item_category`, `metric_name`) plus previous-month value,
      absolute MoM change, and percentage MoM change.
    columns:
      - name: order_month
        tests:
          - not_null
      - name: item_category
        tests:
          - not_null
      - name: metric_name
        tests:
          - not_null
      - name: metric_value
        tests:
          - not_null
        config:
          meta:
            metrics:
              kpi_mom_metric_value_sum:
                type: sum
                label: KPI Metric Value
      - name: previous_month_metric_value
        description: Previous month value for the same category + metric.
        config:
          meta:
            metrics:
              kpi_mom_previous_metric_value_sum:
                type: sum
                label: Previous Month KPI Value
      - name: mom_absolute_change
        description: Current month KPI value minus previous month KPI value.
        config:
          meta:
            metrics:
              kpi_mom_absolute_change_sum:
                type: sum
                label: MoM Absolute Change
      - name: mom_percentage_change
        description: >
          Month-over-month relative change for the KPI:
          (current - previous) / previous.
        config:
          meta:
            metrics:
              kpi_mom_percentage_change_avg:
                type: average
                label: MoM Percentage Change


  - name: rpt_star_products_top10_overall
    description: >
      Top-10 overall star-products scorecard at product grain across the full loaded window.
      Includes revenue rank, share, units, orders, customers, ASP, discount %, and hero flag.
    columns:
      - name: rank_no
        tests:
          - not_null
      - name: product_name
        tests:
          - not_null
      - name: brand_name
      - name: revenue_eur
        config:
          meta:
            metrics:
              star10_revenue_eur_sum:
                type: sum
                label: Star Top10 Revenue EUR
      - name: share_pct
        config:
          meta:
            metrics:
              star10_share_pct_avg:
                type: average
                label: Star Top10 Revenue Share %
      - name: units
        config:
          meta:
            metrics:
              star10_units_sum:
                type: sum
                label: Star Top10 Units
      - name: orders
        config:
          meta:
            metrics:
              star10_orders_sum:
                type: sum
                label: Star Top10 Orders
      - name: customers
        config:
          meta:
            metrics:
              star10_customers_sum:
                type: sum
                label: Star Top10 Customers
      - name: asp_eur
        config:
          meta:
            metrics:
              star10_asp_eur_avg:
                type: average
                label: Star Top10 ASP EUR
      - name: disc_pct
        config:
          meta:
            metrics:
              star10_disc_pct_avg:
                type: average
                label: Star Top10 Discount %
      - name: hero_flag


  - name: rpt_customer_promo_behavior
    description: >
      Customer promo behavior report at item level (Task 2 Q5), kept as the latest-state table.
      Built to answer whether first-time customers come through promotions and
      whether their purchasing is promo-only or mixed.
    columns:
      - name: customer_sk
        tests:
          - not_null
      - name: customer_key
        tests:
          - not_null
      - name: first_order_ts_utc
        description: Timestamp of the customer's first observed order in UTC.
      - name: first_order_ts_berlin
        description: Timestamp of the customer's first observed order in Berlin local time (Europe/Berlin); use this for business trend charts.
      - name: first_order_had_any_promo_units
        description: True if customer's first order contained at least one promo unit.
        tests:
          - not_null
      - name: first_order_had_only_promo_units
        description: True if every purchased unit in customer's first order was promo.
        tests:
          - not_null
      - name: orders_with_any_promo_units
        description: Count of customer orders that include at least one promo unit.
        config:
          meta:
            metrics:
              rcp_orders_with_any_promo_units:
                type: sum
                label: Orders With Any Promo Units
      - name: orders_with_no_promo_units
        description: Count of customer orders that include zero promo units.
        config:
          meta:
            metrics:
              rcp_orders_with_no_promo_units:
                type: sum
                label: Orders With No Promo Units
      - name: promo_units_purchased
        description: Total promo units purchased by customer across lifetime orders.
        config:
          meta:
            metrics:
              rcp_promo_units_purchased:
                type: sum
                label: Promo Units Purchased
      - name: non_promo_units_purchased
        description: Total non-promo units purchased by customer across lifetime orders.
        config:
          meta:
            metrics:
              rcp_non_promo_units_purchased:
                type: sum
                label: Non Promo Units Purchased
      - name: promo_value_eur
        description: Total spend on promo units by customer across lifetime orders.
        config:
          meta:
            metrics:
              rcp_promo_value_eur:
                type: sum
                label: Promo Value EUR
      - name: non_promo_value_eur
        description: Total spend on non-promo units by customer across lifetime orders.
        config:
          meta:
            metrics:
              rcp_non_promo_value_eur:
                type: sum
                label: Non Promo Value EUR
      - name: promo_only_customer_flag
        description: True when customer bought only promo units (no non-promo units) across observed history.



  - name: rpt_category_daypart_monthly
    description: >
      Unified time-behavior model at category-month granularity by Berlin-local
      weekday and hour/daypart buckets.
      Keeps only base additive metrics (revenue_eur, units_sold) for flexible
      aggregation in BI.
    columns:
      - name: order_month
        tests:
          - not_null
      - name: item_category
        tests:
          - not_null
      - name: day_of_week_berlin_num
        tests:
          - not_null
      - name: day_of_week_berlin
        tests:
          - not_null
      - name: order_hour_berlin
        tests:
          - not_null
      - name: daypart_berlin
        tests:
          - not_null
      - name: revenue_eur
        config:
          meta:
            metrics:
              cdm_revenue_eur_sum:
                type: sum
                label: Time Behavior Revenue EUR
      - name: units_sold
        config:
          meta:
            metrics:
              cdm_units_sold_sum:
                type: sum
                label: Time Behavior Units Sold

  - name: rpt_cross_sell_category_pairs
    description: >
      Category-level market-basket report for Task 2 (bought-together analysis).
      Computes support, confidence, and lift for each category pair using order-level co-occurrence.
      Includes actionability buckets and ranks for bundle decisioning, using configured thresholds in dbt vars.
    columns:
      - name: category_a
        tests:
          - not_null
      - name: category_b
        tests:
          - not_null
      - name: pair_orders
        description: Distinct orders containing both categories.
        config:
          meta:
            metrics:
              cscp_pair_orders_sum:
                type: sum
                label: Category Pair Co-Orders
      - name: category_a_orders
      - name: category_b_orders
      - name: total_orders
      - name: product_a_order_penetration
        description: Orders containing product A / total orders.
      - name: product_b_order_penetration
        description: Orders containing product B / total orders.
      - name: support
        description: Support(A,B) = pair_orders / total_orders.
        config:
          meta:
            metrics:
              cscp_support_avg:
                type: average
                label: Category Pair Support
      - name: expected_support_independent
        description: Support(A) * Support(B), expected support if A and B were independent.
        config:
          meta:
            metrics:
              cscp_expected_support_independent_avg:
                type: average
                label: Category Pair Expected Support (Independent)
      - name: expected_pair_orders_independent
        description: Expected co-orders under independence = expected_support_independent * total_orders.
        config:
          meta:
            metrics:
              cscp_expected_pair_orders_independent_avg:
                type: average
                label: Category Pair Expected Co-Orders (Independent)
      - name: pair_orders_vs_expected_delta
        description: Actual pair_orders minus expected_pair_orders_independent.
        config:
          meta:
            metrics:
              cscp_pair_orders_vs_expected_delta_sum:
                type: sum
                label: Category Pair Co-Orders Delta vs Expected
      - name: pair_orders_vs_expected_pct
        description: Relative delta vs expected co-orders under independence.
        config:
          meta:
            metrics:
              cscp_pair_orders_vs_expected_pct_avg:
                type: average
                label: Category Pair Co-Orders Delta % vs Expected
      - name: confidence_a_to_b
        description: Confidence(A→B) = pair_orders / category_a_orders.
        config:
          meta:
            metrics:
              cscp_confidence_a_to_b_avg:
                type: average
                label: Category Pair Confidence A to B
      - name: confidence_b_to_a
        description: Confidence(B→A) = pair_orders / category_b_orders.
        config:
          meta:
            metrics:
              cscp_confidence_b_to_a_avg:
                type: average
                label: Category Pair Confidence B to A
      - name: lift
        description: Lift(A,B) = Support(A,B) / (Support(A) * Support(B)).
        config:
          meta:
            metrics:
              cscp_lift_avg:
                type: average
                label: Category Pair Lift
      - name: actionability_bucket
        description: Actionability class based on support + lift thresholds.
      - name: actionability_rank
        description: Sort priority for actionability buckets (1 best, 5 lowest actionability).
        config:
          meta:
            metrics:
              cscp_actionability_rank_avg:
                type: average
                label: Category Pair Actionability Rank

  - name: rpt_cross_sell_product_pairs
    description: >
      Product-level market-basket report focused on actionable SKU pairing.
      Scope is top-N products by revenue (default 30) and pairs with minimum co-orders
      (default >=50) to reduce noise. Provides support/confidence/lift and pair pattern labels.
    columns:
      - name: product_a
        tests:
          - not_null
      - name: product_b
        tests:
          - not_null
      - name: pair_orders
        description: Distinct orders containing both products.
        config:
          meta:
            metrics:
              cspp_pair_orders_sum:
                type: sum
                label: Product Pair Co-Orders
      - name: product_a_orders
      - name: product_b_orders
      - name: total_orders
      - name: category_a_order_penetration
        description: Orders containing category A / total orders.
      - name: category_b_order_penetration
        description: Orders containing category B / total orders.
      - name: support
        description: Support(A,B) = pair_orders / total_orders.
        config:
          meta:
            metrics:
              cspp_support_avg:
                type: average
                label: Product Pair Support
      - name: expected_support_independent
        description: Support(A) * Support(B), expected support if A and B were independent.
        config:
          meta:
            metrics:
              cspp_expected_support_independent_avg:
                type: average
                label: Product Pair Expected Support (Independent)
      - name: expected_pair_orders_independent
        description: Expected co-orders under independence = expected_support_independent * total_orders.
        config:
          meta:
            metrics:
              cspp_expected_pair_orders_independent_avg:
                type: average
                label: Product Pair Expected Co-Orders (Independent)
      - name: pair_orders_vs_expected_delta
        description: Actual pair_orders minus expected_pair_orders_independent.
        config:
          meta:
            metrics:
              cspp_pair_orders_vs_expected_delta_sum:
                type: sum
                label: Product Pair Co-Orders Delta vs Expected
      - name: pair_orders_vs_expected_pct
        description: Relative delta vs expected co-orders under independence.
        config:
          meta:
            metrics:
              cspp_pair_orders_vs_expected_pct_avg:
                type: average
                label: Product Pair Co-Orders Delta % vs Expected
      - name: confidence_a_to_b
        description: Confidence(A→B) = pair_orders / product_a_orders.
        config:
          meta:
            metrics:
              cspp_confidence_a_to_b_avg:
                type: average
                label: Product Pair Confidence A to B
      - name: confidence_b_to_a
        description: Confidence(B→A) = pair_orders / product_b_orders.
        config:
          meta:
            metrics:
              cspp_confidence_b_to_a_avg:
                type: average
                label: Product Pair Confidence B to A
      - name: lift
        description: Lift(A,B) = Support(A,B) / (Support(A) * Support(B)).
        config:
          meta:
            metrics:
              cspp_lift_avg:
                type: average
                label: Product Pair Lift
      - name: category_a
      - name: category_b
      - name: pattern
        description: Heuristic pair pattern label (e.g., Chip + Dip).
      - name: actionability_bucket
        description: Actionability class based on support + lift thresholds.
      - name: actionability_rank
        description: Sort priority for actionability buckets (1 best, 5 lowest actionability).
        config:
          meta:
            metrics:
              cspp_actionability_rank_avg:
                type: average
                label: Product Pair Actionability Rank

