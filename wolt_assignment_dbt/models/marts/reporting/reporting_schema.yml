        tests:
          - not_null
      - name: as_of_run_date
        tests:
          - not_null
      - name: customer_sk
        tests:
          - not_null

  - name: rpt_item_pair_affinity
    description: Item affinity snapshot with run-level audit columns for traceable metric history.
    columns:
