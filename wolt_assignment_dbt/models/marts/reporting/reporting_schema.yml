    columns:
      - name: run_id
        tests:
          - not_null
      - name: as_of_run_ts
        tests:
          - not_null
      - name: as_of_run_date
        tests:
          - not_null
      - name: date_day
        tests:
          - not_null
      - name: item_category
        tests:
          - not_null

  - name: rpt_customer_promo_behavior
    description: Customer promo behavior snapshot with run-level audit columns for daily history.
    columns:
