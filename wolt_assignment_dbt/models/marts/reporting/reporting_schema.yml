version: 2

models:
  - name: rpt_category_daily
    description: Daily category report snapshot stored per run_id for run-level reproducibility.
    columns:
      - name: run_id
        tests:
          - not_null
      - name: as_of_run_ts
        tests:
          - not_null
      - name: as_of_run_date
        tests:
          - not_null
      - name: date_day
        tests:
          - not_null
      - name: item_category
        tests:
          - not_null

  - name: rpt_customer_promo_behavior
    description: Customer promo behavior at item level, stored per run_id for run-level reproducibility.
    columns:
      - name: run_id
        tests:
          - not_null
      - name: as_of_run_ts
        tests:
          - not_null
      - name: as_of_run_date
        tests:
          - not_null
      - name: customer_sk
        tests:
          - not_null
      - name: first_order_had_any_promo_item
        tests:
          - not_null
      - name: first_order_had_only_promo_items
        tests:
          - not_null

  - name: rpt_item_pair_affinity
    description: Item affinity snapshot stored per run_id for traceable run-level metric history.
    columns:
      - name: run_id
        tests:
          - not_null
      - name: as_of_run_ts
        tests:
          - not_null
      - name: as_of_run_date
        tests:
          - not_null
      - name: item_key_sk_1
        tests:
          - not_null
      - name: item_key_sk_2
        tests:
          - not_null
